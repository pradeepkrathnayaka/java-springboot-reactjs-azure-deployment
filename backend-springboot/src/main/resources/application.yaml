server:
  port: 8080

spring:
  application:
    name: todo-backend

  datasource:
    url: jdbc:h2:mem:tododb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    open-in-view: false
    defer-datasource-initialization: true

  h2:
    console:
      enabled: true
      path: /h2-console

logging:
  level:
    com.app.todo: DEBUG
    org.springframework.web: INFO